AWSTemplateFormatVersion: '2010-09-09'
Description: 'Sabor & Sotaque — DynamoDB + Cognito + Lambda + API Gateway (Free Tier)'

Parameters:
  CloudFrontDomain:
    Type: String
    Description: 'CloudFront distribution domain for CORS (e.g. d1234abcd.cloudfront.net)'
    Default: '*'

Resources:
  # ============================================================
  # DynamoDB Tables (Free Tier: 25 WCU/RCU, 25 GB)
  # ============================================================

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SaborSotaque-Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ProgressTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SaborSotaque-Progress
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: lessonId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: lessonId
          KeyType: RANGE

  LessonsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SaborSotaque-Lessons
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: moduleId
          AttributeType: S
        - AttributeName: lessonId
          AttributeType: S
      KeySchema:
        - AttributeName: moduleId
          KeyType: HASH
        - AttributeName: lessonId
          KeyType: RANGE

  # ============================================================
  # Cognito (Free Tier: 50K MAU)
  # ============================================================

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: SaborSotaque-Users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 6
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
          RequireUppercase: false
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: SaborSotaque-WebApp
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      GenerateSecret: false

  # Initial user: "Mesero de Prueba"
  # Created via CLI after deployment

  # ============================================================
  # Lambda Function (Free Tier: 1M invocations, 400K GB-seconds)
  # ============================================================

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SaborSotaque-LambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !Sub '${UsersTable.Arn}/index/*'
                  - !GetAtt ProgressTable.Arn
                  - !Sub '${ProgressTable.Arn}/index/*'
                  - !GetAtt LessonsTable.Arn
                  - !Sub '${LessonsTable.Arn}/index/*'
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminGetUser
                  - cognito-idp:ListUsers
                Resource: !GetAtt UserPool.Arn
        - PolicyName: PollyAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - polly:SynthesizeSpeech
                Resource: '*'
        - PolicyName: S3AudioAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::sabor-sotaque-${AWS::AccountId}/audio/*'

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SaborSotaque-API
      Runtime: nodejs20.x
      Handler: index.handler
      MemorySize: 128
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          PROGRESS_TABLE: !Ref ProgressTable
          LESSONS_TABLE: !Ref LessonsTable
          USER_POOL_ID: !Ref UserPool
          CLIENT_ID: !Ref UserPoolClient
          CORS_ORIGIN: !Sub 'https://${CloudFrontDomain}'
          AUDIO_BUCKET: !Sub 'sabor-sotaque-${AWS::AccountId}'
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 200, body: 'placeholder' });

  # ============================================================
  # API Gateway HTTP API (Free Tier: 1M calls/month)
  # ============================================================

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: SaborSotaque-API
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Sub 'https://${CloudFrontDomain}'
          - 'http://localhost:3000'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 86400

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: '2.0'

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${HttpApiIntegration}'

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

Outputs:
  ApiUrl:
    Description: 'API Gateway URL'
    Value: !GetAtt HttpApi.ApiEndpoint

  UserPoolId:
    Description: 'Cognito User Pool ID'
    Value: !Ref UserPool

  UserPoolClientId:
    Description: 'Cognito User Pool Client ID'
    Value: !Ref UserPoolClient

  UsersTableName:
    Description: 'DynamoDB Users Table'
    Value: !Ref UsersTable

  ProgressTableName:
    Description: 'DynamoDB Progress Table'
    Value: !Ref ProgressTable

  LessonsTableName:
    Description: 'DynamoDB Lessons Table'
    Value: !Ref LessonsTable
